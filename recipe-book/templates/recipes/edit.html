{% extends "base.html" %}
{% block title %}Edit {{ recipe.name }} — My Recipe Book{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 py-10">

  <div class="mb-8">
    <a href="/recipes/{{ recipe.id }}" class="text-warm-gray text-sm hover:text-terracotta transition-colors">← Back to Recipe</a>
    <h1 class="font-serif text-4xl font-bold text-warm-brown mt-3">Edit Recipe</h1>
  </div>

  <!-- Recipe Form -->
  <form method="POST" action="/recipes/{{ recipe.id }}/edit"
        x-data="recipeForm()">

    <!-- Name + Category row -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 mb-5">
      <div>
        <label class="block text-sm font-semibold text-warm-brown mb-1.5">Recipe Name *</label>
        <input name="name" type="text" required x-model="name"
               class="w-full bg-cream border border-tan rounded-lg px-4 py-2.5 text-sm text-warm-brown
                      placeholder-warm-gray-light focus:border-terracotta outline-none transition-colors" />
      </div>
      <div>
        <label class="block text-sm font-semibold text-warm-brown mb-1.5">Category *</label>
        <select name="category" required x-model="category"
                class="w-full bg-cream border border-tan rounded-lg px-4 py-2.5 text-sm text-warm-brown
                       focus:border-terracotta outline-none transition-colors">
          <option value="Meals" :selected="category === 'Meals'">Meals</option>
          <option value="Snacks" :selected="category === 'Snacks'">Snacks</option>
          <option value="Desserts" :selected="category === 'Desserts'">Desserts</option>
        </select>
      </div>
    </div>

    <!-- Servings + Source URL -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 mb-5">
      <div>
        <label class="block text-sm font-semibold text-warm-brown mb-1.5">Servings *</label>
        <input name="servings" type="number" min="1" required x-model="servings"
               class="w-full bg-cream border border-tan rounded-lg px-4 py-2.5 text-sm text-warm-brown
                      focus:border-terracotta outline-none transition-colors" />
      </div>
      <div>
        <label class="block text-sm font-semibold text-warm-brown mb-1.5">
          Source URL <span class="text-warm-gray font-normal">(leave blank if original)</span>
        </label>
        <input name="source_url" type="url" x-model="sourceUrl"
               class="w-full bg-cream border border-tan rounded-lg px-4 py-2.5 text-sm text-warm-brown
                      placeholder-warm-gray-light focus:border-terracotta outline-none transition-colors" />
      </div>
    </div>

    <!-- Ingredients -->
    <div class="mb-5">
      <label class="block text-sm font-semibold text-warm-brown mb-2">Ingredients *</label>
      <div class="space-y-2">
        <template x-for="(ing, i) in ingredients" :key="i">
          <div class="flex gap-2 items-center">
            <input type="text" name="ingredient_amounts" x-model="ing.amount"
                   placeholder="Amount"
                   class="w-32 bg-cream border border-tan rounded-lg px-3 py-2 text-sm text-warm-brown
                          placeholder-warm-gray-light focus:border-terracotta outline-none transition-colors" />
            <input type="text" name="ingredient_names" x-model="ing.name"
                   placeholder="Ingredient name"
                   class="flex-1 bg-cream border border-tan rounded-lg px-3 py-2 text-sm text-warm-brown
                          placeholder-warm-gray-light focus:border-terracotta outline-none transition-colors" />
            <button type="button" @click="removeIngredient(i)"
                    x-show="ingredients.length > 1"
                    class="remove-ingredient text-warm-gray hover:text-red-400 transition-colors p-1">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
              </svg>
            </button>
          </div>
        </template>
      </div>
      <button type="button" @click="addIngredient()"
              class="mt-2.5 text-sm text-terracotta hover:text-terracotta-dark font-medium flex items-center gap-1 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        Add Ingredient
      </button>
    </div>

    <!-- Steps -->
    <div class="mb-5">
      <label class="block text-sm font-semibold text-warm-brown mb-1.5">Instructions *</label>
      <p class="text-xs text-warm-gray mb-2">Enter each step on a new line.</p>
      <textarea name="steps" rows="8" required x-model="steps"
                class="w-full bg-cream border border-tan rounded-lg px-4 py-3 text-sm text-warm-brown
                       placeholder-warm-gray-light focus:border-terracotta outline-none transition-colors
                       resize-y leading-relaxed"></textarea>
    </div>

    <!-- Notes -->
    <div class="mb-8">
      <label class="block text-sm font-semibold text-warm-brown mb-1.5">
        Notes <span class="text-warm-gray font-normal">(optional)</span>
      </label>
      <textarea name="notes" rows="3" x-model="notes"
                placeholder="Storage tips, substitutions, serving suggestions..."
                class="w-full bg-cream border border-tan rounded-lg px-4 py-3 text-sm text-warm-brown
                       placeholder-warm-gray-light focus:border-terracotta outline-none transition-colors resize-y"></textarea>
    </div>

    <!-- Nutrition -->
    <div x-show="category !== 'Desserts'" class="bg-parchment border border-tan rounded-xl p-5 mb-8">
      <div class="flex items-center justify-between mb-1">
        <p class="text-sm font-semibold text-warm-brown">Nutrition per Serving
          <span class="text-warm-gray font-normal">(optional)</span>
        </p>
        <button type="button" @click="calcNutrition()"
                :disabled="calcLoading || ingredients.every(i => !i.name.trim())"
                class="flex items-center gap-1.5 text-xs font-semibold text-terracotta hover:text-terracotta-dark
                       disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
          <svg x-show="calcLoading" class="animate-spin w-3.5 h-3.5" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
          </svg>
          <svg x-show="!calcLoading" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 11h.01M12 11h.01M15 11h.01M4 7h16a1 1 0 011 1v10a1 1 0 01-1 1H4a1 1 0 01-1-1V8a1 1 0 011-1z"/>
          </svg>
          <span x-text="calcLoading ? 'Calculating…' : 'Calculate from Ingredients'"></span>
        </button>
      </div>
      <p x-show="calcMsg" x-text="calcMsg" x-cloak
         :class="calcError ? 'text-amber-600' : 'text-green-700'"
         class="text-xs mb-3"></p>
      <div class="grid grid-cols-2 sm:grid-cols-5 gap-3 mt-3">
        <div>
          <label class="block text-xs text-warm-gray mb-1">Calories</label>
          <input name="calories" type="number" min="0" step="1" x-model="nutrition.calories"
                 class="w-full bg-cream border border-tan rounded-lg px-3 py-2 text-sm text-warm-brown
                        focus:border-terracotta outline-none transition-colors" />
        </div>
        <div>
          <label class="block text-xs text-warm-gray mb-1">Protein (g)</label>
          <input name="protein_g" type="number" min="0" step="0.1" x-model="nutrition.protein_g"
                 class="w-full bg-cream border border-tan rounded-lg px-3 py-2 text-sm text-warm-brown
                        focus:border-terracotta outline-none transition-colors" />
        </div>
        <div>
          <label class="block text-xs text-warm-gray mb-1">Carbs (g)</label>
          <input name="carbs_g" type="number" min="0" step="0.1" x-model="nutrition.carbs_g"
                 class="w-full bg-cream border border-tan rounded-lg px-3 py-2 text-sm text-warm-brown
                        focus:border-terracotta outline-none transition-colors" />
        </div>
        <div>
          <label class="block text-xs text-warm-gray mb-1">Fat (g)</label>
          <input name="fat_g" type="number" min="0" step="0.1" x-model="nutrition.fat_g"
                 class="w-full bg-cream border border-tan rounded-lg px-3 py-2 text-sm text-warm-brown
                        focus:border-terracotta outline-none transition-colors" />
        </div>
        <div>
          <label class="block text-xs text-warm-gray mb-1">Fiber (g)</label>
          <input name="fiber_g" type="number" min="0" step="0.1" x-model="nutrition.fiber_g"
                 class="w-full bg-cream border border-tan rounded-lg px-3 py-2 text-sm text-warm-brown
                        focus:border-terracotta outline-none transition-colors" />
        </div>
      </div>
    </div>

    <!-- Submit -->
    <div class="flex gap-3">
      <button type="submit"
              class="bg-terracotta hover:bg-terracotta-dark text-white font-semibold px-8 py-3 rounded-lg transition-colors">
        Save Changes
      </button>
      <a href="/recipes/{{ recipe.id }}"
         class="border border-tan text-warm-gray hover:text-warm-brown px-6 py-3 rounded-lg text-sm font-medium transition-colors">
        Cancel
      </a>
    </div>

  </form>
</div>

<script>
function recipeForm() {
  // Pre-populate from server-rendered data
  return {
    name: {{ recipe.name | tojson }},
    category: {{ recipe.category.value | tojson }},
    servings: {{ recipe.servings }},
    sourceUrl: {{ (recipe.source_url or '') | tojson }},
    steps: {{ recipe.steps | tojson }},
    notes: {{ (recipe.notes or '') | tojson }},
    ingredients: {{ recipe.ingredients | map(attribute='name') | list | tojson }} .map((name, i) => ({
      name: name,
      amount: {{ recipe.ingredients | map(attribute='amount') | list | tojson }}[i] || ''
    })),
    nutrition: {
      calories: {{ recipe.nutrition.calories if recipe.nutrition and recipe.nutrition.calories is not none else 'null' }},
      protein_g: {{ recipe.nutrition.protein_g if recipe.nutrition and recipe.nutrition.protein_g is not none else 'null' }},
      carbs_g: {{ recipe.nutrition.carbs_g if recipe.nutrition and recipe.nutrition.carbs_g is not none else 'null' }},
      fat_g: {{ recipe.nutrition.fat_g if recipe.nutrition and recipe.nutrition.fat_g is not none else 'null' }},
      fiber_g: {{ recipe.nutrition.fiber_g if recipe.nutrition and recipe.nutrition.fiber_g is not none else 'null' }},
    },
    calcLoading: false,
    calcMsg: '',
    calcError: false,

    addIngredient() {
      this.ingredients.push({ name: '', amount: '' });
    },
    removeIngredient(i) {
      if (this.ingredients.length > 1) {
        this.ingredients.splice(i, 1);
      }
    },
    async calcNutrition() {
      this.calcLoading = true;
      this.calcMsg = '';
      this.calcError = false;
      try {
        const resp = await fetch('/api/calculate-nutrition', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            ingredients: this.ingredients.filter(i => i.name.trim()),
            servings: parseInt(this.servings) || 1,
          }),
        });
        const result = await resp.json();
        const n = result.per_serving;
        if (n.calories) this.nutrition.calories = n.calories;
        if (n.protein_g) this.nutrition.protein_g = n.protein_g;
        if (n.carbs_g) this.nutrition.carbs_g = n.carbs_g;
        if (n.fat_g) this.nutrition.fat_g = n.fat_g;
        if (n.fiber_g) this.nutrition.fiber_g = n.fiber_g;
        const missing = result.missing || [];
        if (missing.length > 0) {
          this.calcError = true;
          this.calcMsg = `Estimated (${result.found}/${result.total} ingredients found). Not found: ${missing.join(', ')}.`;
        } else {
          this.calcMsg = `Estimated from ${result.found} ingredient${result.found !== 1 ? 's' : ''}. Review and adjust as needed.`;
        }
      } catch (e) {
        this.calcError = true;
        this.calcMsg = 'Could not calculate nutrition. Please try again.';
      } finally {
        this.calcLoading = false;
      }
    },
  };
}
</script>
{% endblock %}
